name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Run unit tests
        run: GOTOOLCHAIN=local go test ./...

  phase1-acceptance:
    name: Phase 1 observability smoke
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Run Phase 1 observability/provenance gate
        run: GOTOOLCHAIN=local ./scripts/accept_phase1.sh
