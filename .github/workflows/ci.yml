name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Run unit tests
        run: GOTOOLCHAIN=local go test ./...

  sensor-build:
    name: eBPF sensor builds from committed bindings
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      # The bpf2go bindings (sensorbpf_bpf*.go/.o) are committed, so this builds
      # the Linux sensor without clang/bpftool: the reproducible-build guarantee.
      - name: Build agentprov-sensor from committed bindings
        run: GOTOOLCHAIN=local go build -o /dev/null ./cmd/agentprov-sensor

  sensor-bindings-drift:
    name: eBPF sensor bindings not stale
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Install eBPF toolchain (clang + bpftool)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-generic
          # Expose a bpftool on PATH (GH images ship it under /usr/lib/linux-tools).
          if ! command -v bpftool >/dev/null 2>&1; then
            BPFTOOL="$(find /usr/lib/linux-tools -name bpftool -type f 2>/dev/null | head -1)"
            [ -n "$BPFTOOL" ] && sudo ln -sf "$BPFTOOL" /usr/local/sbin/bpftool
          fi

      - name: Regenerate and fail on drift of committed .go bindings
        run: GOTOOLCHAIN=local scripts/regen-sensor.sh --check

  phase1-acceptance:
    name: Phase 1 observability smoke
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Run Phase 1 observability/provenance gate
        run: GOTOOLCHAIN=local ./scripts/accept_phase1.sh
