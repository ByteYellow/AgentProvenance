<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">AgentProvenance evidence DAG</title>
  <desc id="desc">A causal chain from model intent and tool call to process, runtime events, file and network effects, policy decisions, risks, responses, and verification.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2}.intent{fill:#eef2ff;stroke:#6366f1}.sys{fill:#ecfeff;stroke:#0891b2}.risk{fill:#fff7ed;stroke:#f97316}.ok{fill:#f0fdf4;stroke:#22c55e}.edge{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.title{font:700 24px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.h{font:700 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.t{font:12px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1280" height="560"/>
  <text x="48" y="54" class="title">Git-like evidence DAG: from agent intent to verified audit trail</text>

  <rect x="60" y="120" width="155" height="72" rx="14" class="intent"/>
  <text x="86" y="150" class="h">LLM intent</text>
  <text x="84" y="172" class="t">TLS metadata / hash</text>
  <rect x="275" y="120" width="155" height="72" rx="14" class="intent"/>
  <text x="303" y="150" class="h">ToolCallScope</text>
  <text x="305" y="172" class="t">run / session / tool</text>
  <rect x="490" y="120" width="155" height="72" rx="14" class="sys"/>
  <text x="535" y="150" class="h">Process</text>
  <text x="530" y="172" class="t">pid / ppid / cgroup</text>
  <rect x="705" y="120" width="155" height="72" rx="14" class="sys"/>
  <text x="744" y="150" class="h">Runtime event</text>
  <text x="730" y="172" class="t">exec / file / network</text>
  <rect x="920" y="120" width="155" height="72" rx="14" class="risk"/>
  <text x="957" y="150" class="h">Policy / risk</text>
  <text x="948" y="172" class="t">secret / metadata IP</text>
  <rect x="1135" y="120" width="100" height="72" rx="14" class="ok"/>
  <text x="1154" y="150" class="h">Response</text>
  <text x="1163" y="172" class="t">audit / taint</text>

  <path class="edge" d="M215 156H275"/>
  <path class="edge" d="M430 156H490"/>
  <path class="edge" d="M645 156H705"/>
  <path class="edge" d="M860 156H920"/>
  <path class="edge" d="M1075 156H1135"/>

  <rect x="165" y="300" width="175" height="72" rx="14" class="node"/>
  <text x="204" y="330" class="h">File diff</text>
  <text x="195" y="352" class="t">created / modified / deleted</text>
  <rect x="420" y="300" width="175" height="72" rx="14" class="node"/>
  <text x="462" y="330" class="h">Artifact</text>
  <text x="454" y="352" class="t">sha256 / object ref</text>
  <rect x="675" y="300" width="175" height="72" rx="14" class="ok"/>
  <text x="724" y="330" class="h">Manifest</text>
  <text x="708" y="352" class="t">content-addressed refs</text>
  <rect x="930" y="300" width="175" height="72" rx="14" class="ok"/>
  <text x="986" y="330" class="h">Verify</text>
  <text x="966" y="352" class="t">hash / parent / signature</text>

  <path class="edge dash" d="M782 192C760 260 310 230 252 300"/>
  <path class="edge" d="M340 336H420"/>
  <path class="edge" d="M595 336H675"/>
  <path class="edge" d="M850 336H930"/>

  <text x="58" y="484" class="t">The graph is not a trace dashboard. It answers: which intent caused which process, which event touched which file or network target, and which evidence supports the risk decision.</text>
</svg>
